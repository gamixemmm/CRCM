version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: crms_user
      POSTGRES_PASSWORD: crms_password
      POSTGRES_DB: crms_db
    ports:
      - "5432:5432"
    volumes:
      - crms_pgdata:/var/lib/postgresql/data

volumes:
  crms_pgdata:
